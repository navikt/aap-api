openapi: "3.0.0"
info:
  title: Arbeidsavklaringspenger (AAP) API
  description: |
    AAP API tilbyr AAP-informasjon til eksterne konsumenter som enten har hjemmel til å hente
    AAP informasjon eller et samtykke fra bruker. Konsumenter må logge seg inn med token fra
    Maskinporten (alle konsumenter) og et Samtykke-token (konsumenter som ikke har hjemmel).
    
    Lenker til autentiseringsløsninger:
    
    [Maskinporten](https://www.digdir.no/felleslosninger/maskinporten/869)
    
    [Samtykke](https://www.altinndigital.no/produkter/samtykke/)
    
    Merk at Maskinporten sitt test-token har en veldig kort levetid (29 sekunder), så det
    egner seg dårlig til manuell test, med mindre man er kjapp til å taste. Det er best å
    bruke denne Swagger-dokumentasjonen som en referanse til å lage en automatisert test,
    ikke teste selve oppslaget.
    
    Vi tilbyr flere løsninger, avhengig av behov og konsument. Vi har kalt dem henholdsvis
    minimumsløsningen, medium- og maksimumsløsningen.
    
    For en gitt person returnerer maksimumsløsningen en liste med vedtak, gyldig for en
    gitt periode, og en liste med utbetalinger på dette vedtaket.
    
    | Ord                   | Kommentar                                                                                                                      |
    |-----------------------|--------------------------------------------------------------------------------------------------------------------------------|
    | Kildesystem | Enten `ARENA` (gammelt system), eller `KELVIN` (nytt system). |
    | Dagsats               | Her har vi to verdier. Den som ligger på selve vedtaket er før samordning uten barnetillegg, mens det som ligger i utbetalingsobjektet er etter samordning uten barnetillegg. |
    | Beløp                 | Fullt beløp, etter samhandling med barnetillegg. Det bruker faktisk får utbetalt.                                       |
    | Barnetillegg          | Totalt barnetillegg på det siste vedtaket.              |                                                                                                                 |
    | Beregningsgrunnlag    | Inntektsgrunnlaget vedtaket ble basert på. Fra Arena er denne alltid større enn eller lik minst ~1.33G.                       |
    | Rettighetstype        | Ativitetsfasekode i gammelt system.  Mulige verdier er `UVUP` (påvente av uføretrygd), `FA` (påvente av arbeid), `UA` (under arbeidsavklaring), `AU` (arbeidsutprøving), `IKKE` (Ikke spesif. aktivitetsfase) og `SPE` (sykepengeerstatning). Om kildesystem (`kilde`) er Kelvin er disse verdiene mulige: `BISTANDSBEHOV`, `SYKEPENGEERSTATNING`, `STUDENT`,  `ARBEIDSSØKER`,  `VURDERES_FOR_UFØRETRYGD`.|                                                                                                |
    | Status (vedtakstatus) | Hvis kildesystem er Arena kan denne ha verdiene `IVERK` og `AVSLU`. `IVERK` betyr at vedtaket er iverksatt (spesifikt om vedtakstypen er `S` (stans), betyr det at ytelsen er stanset), mens `AVSLU` betyr _avsluttet_. Fra ny løsning (Kelvin) kommer verdiene `LØPENDE`, `AVSLUTTET` og `UTREDES`. Fra nytt system tolkes `AVSLUTTET` som at ytelsen har stoppet opp.                                                                                        |
    | vedtakId | ID som refererer til vedtaket. Denne ID'en brukes også for hendelser fra Arena i samhandlings-API'et. Fra nytt system er dette en referanse til nyeste endring på saken. |
    | Saksnummer | Referanse til saken. Fra gammelt system er dette en long, fra nytt system er dette en string. |
    | Vedtaksdato | Hvis `kildesystem` er `ARENA`: dato på første vedtak. For Kelvin-saker: dato for siste vedtak på saken. |
    | Vedtakstype | Hvis `kildesystem` er `ARENA`: kan være `E` (Endring), `G` (Gjenpptak), `O` (Ny rettighet),  `S` (Stans). Om vedstakstypen er `S`, kombinert med vedtaksstatus `IVERK`, betyr det at ytelsen er stanset. Hvis kilde er `KELVIN` er denne `null`. |
    | Periode (på vedtaket) | Gyldighetsperioden for vedtaket.|
    | Barn med stønad | Antall barn som bruker får barnetillegg for.|
    | Sykedager | Reduksjon som skyldes   |
    | Sent meldekort | Om meldekortet ble sendt inn sent. Denne informasjonen er kun tilgjengelig fra Arena. |
    | Fravær | Antall fraværsdager. Denne informasjonen er kun tilgjengelig fra Arena.| 
    | Utbetalingsgrad | Kommer fra Kelvin. Er `null` fra Arena. |
    | Samordnings-ID | Her finnes kun data fra ny løsning. Ellers null. |
    | Opphørsårsak | Kommer i Kelvin. Er `null` når kilden er Arena. |
    
  
    ## Litt om vedtak fra nytt system
    
    Den største forskjellen på nytt og gammelt system er bruken av ordet _vedtak_. I nytt system teller hvert saksbehandlingløp som et nytt vedtak. Man snakker heller om "sak" når man vil referere til den løpende ytelsen.


    ## SAM-varsler
  
    For varsling av nye vedtak eller signifikante endringer i vedtak blir det sendt varsler via SAM.
    Fra AAP vil det komme varsler i disse tilfellene:
    * Førstegangsvedtak
    * Endring i RettighetsType
    * signifikant endring i utbetaling
      - fra 0 til >0
      - fra >0 til 0
    * Utvidelse av rettighetsperiode (forlengelse av til-dato)

    ## Relevante lenker

